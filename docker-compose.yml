version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: table-order-mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: table_order
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: table-order-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: mysql+aiomysql://root:password@mysql:3306/table_order
      JWT_SECRET_KEY: dev-secret-key-change-in-production
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_HOURS: 16
      UPLOAD_DIR: /app/uploads
      MAX_UPLOAD_SIZE: 5242880
      CORS_ORIGINS: '["http://localhost:5173","http://localhost:5174"]'
      LOG_LEVEL: INFO
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
  uploads_data:
